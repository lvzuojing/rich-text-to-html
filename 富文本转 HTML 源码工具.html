<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word 级富文本转 HTML 工具</title>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            color: #2c3e50;
            font-size: 28px;
        }

        .header p {
            color: #666;
            font-size: 15px;
            margin-top: 8px;
        }

        /* 编辑器外层容器 */
        .editor-wrapper {
            width: 100%;
            max-width: 1100px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }

        /* 底部操作区 */
        .action-bar {
            width: 100%;
            max-width: 1100px;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }

        /* 巨无霸一键复制按钮 */
        .btn-copy {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(74, 144, 226, 0.4);
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-copy:hover {
            background-color: #357abd;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.5);
        }

        .btn-copy:active {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📝 Word 级别排版 & HTML 提取器</h1>
        <p>顶配排版功能 | 完美支持 Word/网页复制粘贴 | 隐藏繁琐代码</p>
    </div>

    <!-- 只需要一个 textarea 容器，引擎会自动把它变成强大的编辑器 -->
    <div class="editor-wrapper">
        <textarea id="word-editor">
            <p style="text-align: center;"><span style="font-size: 18pt;"><strong>请在这里开始你的排版...</strong></span></p>
            <p style="text-align: left;">你可以直接将 Word、Excel 或其他网页中的内容<strong>全选复制，然后粘贴</strong>到这里。大部分的表格、颜色和字体格式都会被完美保留！</p>
        </textarea>
    </div>

    <!-- 底部一键操作 -->
    <div class="action-bar">
        <button class="btn-copy" id="copyBtn" onclick="copyHtmlCode()">⚡ 排版完毕，一键提取 HTML 代码</button>
    </div>

    <!-- 引入 TinyMCE 核心库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js"></script>
    
    <script>
        // 初始化超级富文本编辑器
        tinymce.init({
            selector: '#word-editor',
            // 引入中文语言包
            language: 'zh_Hans',
            language_url: 'https://cdn.jsdelivr.net/npm/tinymce-i18n@23.10.9/langs6/zh_Hans.js',
            
            // 开启所有能开的插件（表格、搜索替换、字符、列表、全屏、预览等）
            plugins: 'preview searchreplace autolink directionality visualblocks visualchars fullscreen image link media table charmap pagebreak nonbreaking anchor insertdatetime advlist lists wordcount help emoticons',
            
            // 启用类似 Word 的顶部菜单栏
            menubar: 'file edit view insert format tools table help',
            
            // 暴力展开所有工具栏按钮，不折叠
            toolbar_mode: 'wrap',
            
            // 自定义工具栏：字号字体、加粗斜体、颜色、对齐、缩进、列表、表格、全屏预览等
            toolbar: 'undo redo | fontfamily fontsize blocks | bold italic underline strikethrough | forecolor backcolor | alignleft aligncenter alignright alignjustify | outdent indent | numlist bullist | lineheight | table | charmap emoticons | searchreplace | fullscreen preview',
            
            // 设置编辑器高度
            height: 700,
            
            // 优化编辑器内部的默认字体和排版样式
            content_style: `
                body { 
                    font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', 'Segoe UI', Roboto, Arial, sans-serif; 
                    font-size: 16px; 
                    line-height: 1.6;
                    padding: 20px;
                }
                table { border-collapse: collapse; width: 100%; }
                td, th { border: 1px solid #ccc; padding: 8px; }
            `,
            
            // 允许粘贴保留格式
            paste_data_images: true, 
        });

        // 【核心功能】一键提取并复制 HTML 代码
        function copyHtmlCode() {
            // 获取 TinyMCE 编辑器里的纯正 HTML 代码
            const htmlCode = tinymce.activeEditor.getContent();

            if (!htmlCode || htmlCode === '') {
                alert('你还没写任何内容呢！');
                return;
            }

            // 写入剪贴板
            navigator.clipboard.writeText(htmlCode).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalText = btn.innerText;
                
                // 给用户爽快的视觉反馈
                btn.innerText = '✅ 提取并复制成功！快去粘贴吧 (Ctrl+V)';
                btn.style.backgroundColor = '#28a745';
                btn.style.boxShadow = '0 6px 16px rgba(40, 167, 69, 0.4)';

                // 3秒后按钮恢复
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = '#4a90e2';
                    btn.style.boxShadow = '0 6px 16px rgba(74, 144, 226, 0.4)';
                }, 3000);
            }).catch(err => {
                console.error('复制失败', err);
                alert('浏览器拦截了复制动作，你可以点击工具栏的【视图 -> 源代码】手动复制。');
            });
        }
    </script>
</body>
</html>
